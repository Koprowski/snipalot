appId: app.snipalot
productName: Snipalot
copyright: Copyright © 2026 Jason Koprowski
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
  - '!**/*.ts'
  - '!**/*.map'
asarUnpack:
  - node_modules/ffmpeg-static/**/*
extraResources:
  - from: resources
    to: resources
    filter:
      - '**/*'
      - '!bin/whisper/**'
      - '!models/**'
      - '!models/**/.gitkeep'
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/app.ico
  artifactName: Snipalot-${version}-setup.${ext}
portable:
  artifactName: Snipalot-${version}-portable.exe

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createStartMenuShortcut: true
  shortcutName: Snipalot
  runAfterFinish: true
  warningsAsErrors: false
  artifactName: Snipalot-${version}-setup.exe
publish:
  provider: github
  releaseType: draft
