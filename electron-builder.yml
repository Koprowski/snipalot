appId: app.snipalot
productName: Snipalot
copyright: Copyright © 2026 Jason Koprowski
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
  - '!**/*.ts'
  - '!**/*.map'
extraResources:
  - from: resources
    to: resources
    filter:
      - '**/*'
      - '!models/**/.gitkeep'
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icons/app.png
  artifactName: Snipalot-${version}-setup.${ext}
  signAndEditExecutable: false
  sign: null
portable:
  artifactName: Snipalot-${version}-portable.exe

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: Snipalot-${version}-setup.exe
publish:
  provider: github
  releaseType: draft
