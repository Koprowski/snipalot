<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Snipalot</title>
    <link rel="stylesheet" href="launcher.css" />
  </head>
  <body>
    <div class="titlebar">
      <div class="titlebar-drag">
        <span class="titlebar-title">Snipalot</span>
      </div>
      <div class="titlebar-controls">
        <button id="btn-pin" class="tb-btn tb-pin" title="Pin on top — when enabled, launcher stays visible above other windows" aria-label="Pin on top" aria-pressed="false">
          <!-- Pin icon: small pushpin, outlined when off / filled when on. -->
          <svg width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
            <path d="M7.5 1 L11 4.5 L8.5 5 L8 7.5 L4.5 4 L7 3.5 Z M5 5 L7 7 L4 10 Z"
                  fill="none" stroke="currentColor" stroke-width="1" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="btn-minimize" class="tb-btn" title="Minimize" aria-label="Minimize">
          <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1"/></svg>
        </button>
        <button id="btn-quit" class="tb-btn tb-close" title="Exit Snipalot" aria-label="Exit Snipalot">
          <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1"/></svg>
        </button>
      </div>
    </div>
    <div class="content">
      <div class="header">
        <span class="app-title">Snipalot</span>
        <span class="state-label" id="state-label">IDLE</span>
        <span class="header-spacer"></span>
        <button id="btn-copy-last" class="btn-icon btn-icon-sm" title="Copy last prompt — re-copies the prompt from the most recent recording / trade / screenshot to the clipboard">
          <!-- Clipboard SVG: rounded body + clip top tab + a single text line. -->
          <svg width="13" height="14" viewBox="0 0 13 14" aria-hidden="true">
            <rect x="1" y="2.5" width="11" height="11" rx="1.5" fill="none" stroke="currentColor" stroke-width="1"/>
            <rect x="3.5" y="0.5" width="6" height="3" rx="0.6" fill="none" stroke="currentColor" stroke-width="1"/>
            <line x1="3.5" y1="7" x2="9.5" y2="7" stroke="currentColor" stroke-width="1"/>
            <line x1="3.5" y1="9.5" x2="8" y2="9.5" stroke="currentColor" stroke-width="1"/>
          </svg>
        </button>
        <button id="btn-copy-log" class="btn-icon btn-icon-sm" title="Copy troubleshooting log file">
          <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
            <circle cx="7" cy="7.5" r="3.4" fill="none" stroke="currentColor" stroke-width="1.1"/>
            <path d="M4.7 4.8 3.1 3.2M9.3 4.8l1.6-1.6M4 7.2H1.5M10 7.2h2.5M4.6 10 2.7 11.3M9.4 10l1.9 1.3M7 4.2V2.3M5.4 6.8h3.2M5.4 8.7h3.2" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-settings" class="btn-icon btn-icon-sm" title="Settings">⚙</button>
      </div>
      <div class="capture-mode" role="group" aria-label="Capture mode">
        <button id="capture-select" class="capture-mode-btn active" type="button" data-mode="region" title="Drag to select a region">Select</button>
        <button id="capture-fullscreen" class="capture-mode-btn" type="button" data-mode="fullscreen" title="Captures Full Screen Based Upon Cursor Location">Full screen</button>
        <button id="capture-window" class="capture-mode-btn" type="button" data-mode="window" title="Specific window capture is coming soon" disabled>Window</button>
      </div>
      <div class="hint" id="hint">Select mode lets you drag the area to capture.</div>
      <div class="controls">
        <button id="btn-primary" class="btn-primary" title="Record">
          <!-- Play-triangle glyph; sibling Screenshot button uses a
               camera glyph for visual symmetry. -->
          <svg class="btn-glyph" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
            <polygon points="2,1 11,6 2,11" fill="currentColor"/>
          </svg>
          <span id="btn-label">Record</span>
        </button>
        <button id="btn-screenshot" class="btn-screenshot" title="Screenshot">
          <!-- Camera glyph: rounded body (rect), viewfinder hump (small
               rect on top), and lens (circle). currentColor inherits
               from the button so it re-tints with the active state. -->
          <svg class="btn-glyph" width="14" height="12" viewBox="0 0 14 12" aria-hidden="true">
            <rect x="4.2" y="0.5" width="3.6" height="1.6" rx="0.4" fill="currentColor"/>
            <rect x="0.5" y="2" width="11" height="9" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.1"/>
            <circle cx="6" cy="6.5" r="2.4" fill="none" stroke="currentColor" stroke-width="1.1"/>
          </svg>
          <span id="btn-screenshot-label">Screenshot</span>
        </button>
        <button id="btn-trade" class="btn-trade" title="Trade — record a session for trade-log extraction">
          <!-- Candlestick chart glyph: three vertical wicks of varying
               height (the bottom of one slightly above the prior, evoking
               an uptrend), with thicker bodies. currentColor inherits
               from the button so it re-tints in the selecting state. -->
          <svg class="btn-glyph" width="14" height="12" viewBox="0 0 14 12" aria-hidden="true">
            <line x1="2.5" y1="1.5" x2="2.5" y2="10.5" stroke="currentColor" stroke-width="1"/>
            <rect x="1.4" y="3.5" width="2.2" height="4" fill="currentColor"/>
            <line x1="7" y1="0.5" x2="7" y2="11" stroke="currentColor" stroke-width="1"/>
            <rect x="5.9" y="2" width="2.2" height="6.5" fill="currentColor"/>
            <line x1="11.5" y1="2" x2="11.5" y2="9" stroke="currentColor" stroke-width="1"/>
            <rect x="10.4" y="3" width="2.2" height="3" fill="currentColor"/>
          </svg>
          <span id="btn-trade-label">Trade</span>
        </button>
      </div>
      <div class="shortcut-row">
        <span class="shortcut-chip" id="hk-record">Record: Ctrl+Shift+S</span>
        <span class="shortcut-chip" id="hk-screenshot">Screenshot: Ctrl+Shift+P</span>
        <span class="shortcut-chip" id="hk-trade">Trade: Ctrl+Shift+T</span>
      </div>
      <button id="launcher-update" class="launcher-update" type="button" hidden>
        <span id="launcher-update-label">New version available. Click here to install.</span>
      </button>
      <!-- Progress bar shown only during 'processing' state. The label
           above (hint) carries the step name; this bar shows the
           wall-clock estimate. ETA text + elapsed/total below. -->
      <div class="progress-block" id="progress-block" style="display:none">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-meta">
          <span id="progress-elapsed">0:00</span>
          <span id="progress-eta">~0:00 remaining</span>
        </div>
      </div>
    </div>
    <script src="launcher.js"></script>
  </body>
</html>
