<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Snipalot</title>
    <link rel="stylesheet" href="launcher.css" />
  </head>
  <body>
    <div class="titlebar">
      <div class="titlebar-drag">
        <span class="titlebar-title">Snipalot</span>
      </div>
      <div class="titlebar-controls">
        <button id="btn-minimize" class="tb-btn" title="Minimize" aria-label="Minimize">
          <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1"/></svg>
        </button>
        <button id="btn-quit" class="tb-btn tb-close" title="Close" aria-label="Close">
          <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1"/></svg>
        </button>
      </div>
    </div>
    <div class="content">
      <div class="header">
        <span class="app-title">Snipalot</span>
        <span class="state-label" id="state-label">IDLE</span>
        <span class="header-spacer"></span>
        <button id="btn-settings" class="btn-icon btn-icon-sm" title="Settings">⚙</button>
      </div>
      <div class="controls">
        <button id="btn-primary" class="btn-primary" title="Record">
          <!-- Play-triangle glyph; replaces the original white dot. The
               sibling Screenshot button (when issue #1 ships) will use a
               camera glyph for visual symmetry. -->
          <svg class="btn-glyph" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
            <polygon points="2,1 11,6 2,11" fill="currentColor"/>
          </svg>
          <span id="btn-label">Record</span>
        </button>
      </div>
      <div class="hint" id="hint">Click Record to select a region</div>
    </div>
    <script src="launcher.js"></script>
  </body>
</html>
