<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Snipalot overlay</title>
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="status" class="status-hidden">
      <span id="status-text">annotation mode · Esc to exit</span>
    </div>

    <div id="region-status" class="region-status region-hidden">
      <span>drag to select region · <b>Enter</b> to confirm · <b>Esc</b> to cancel</span>
    </div>

    <div id="region-confirm" class="region-confirm region-hidden">
      <button id="region-confirm-btn" class="region-btn primary">Start recording</button>
      <button id="region-cancel-btn" class="region-btn">Cancel</button>
      <span class="region-dims" id="region-dims"></span>
    </div>

    <!-- shape picker — visible only in annotation mode -->
    <div id="shape-picker" class="shape-picker region-hidden">
      <span id="shape-picker-grip" class="shape-picker-grip" title="Drag to move toolbar">⋮⋮</span>
      <button class="shape-btn" data-shape="select" title="Select (S) — pick existing annotations without drawing">↖</button>
      <button class="shape-btn active" data-shape="rect" title="Rectangle (1)">▭</button>
      <button class="shape-btn" data-shape="circle" title="Circle (2)">◯</button>
      <button class="shape-btn" data-shape="oval" title="Oval (3)">⬭</button>
      <button class="shape-btn" data-shape="line" title="Line (4)">╱</button>
      <button class="shape-btn" data-shape="arrow" title="Arrow (5)">➜</button>
      <button class="shape-btn" data-shape="text" title="Text (6)">T</button>
      <span class="shape-picker-sep"></span>
      <button id="btn-clear-all" class="shape-btn shape-btn-danger" title="Clear all annotations (Ctrl+Shift+C)">🗑</button>
    </div>

    <!-- text input for text annotations -->
    <input id="text-input" class="text-input" type="text" placeholder="type, Enter to commit, Esc to cancel" spellcheck="false" style="display:none" />

    <!-- countdown overlay shown after region is confirmed (mouseup ends drag);
         counts 3-2-1-GO then auto-fires confirm-region. Esc cancels. -->
    <div id="countdown" class="countdown countdown-hidden">
      <div class="countdown-number" id="countdown-number">3</div>
      <div class="countdown-hint">Recording in… · Esc to cancel</div>
    </div>

    <script src="overlay.js"></script>
  </body>
</html>
