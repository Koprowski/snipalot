<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Snipalot</title>
    <link rel="stylesheet" href="launcher.css" />
  </head>
  <body>
    <div class="titlebar">
      <div class="titlebar-drag">
        <span class="titlebar-title">Snipalot</span>
      </div>
      <div class="titlebar-controls">
        <button id="btn-minimize" class="tb-btn" title="Minimize" aria-label="Minimize">
          <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="5" x2="10" y2="5" stroke="currentColor" stroke-width="1"/></svg>
        </button>
        <button id="btn-quit" class="tb-btn tb-close" title="Close" aria-label="Close">
          <svg width="10" height="10" viewBox="0 0 10 10"><line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1"/><line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1"/></svg>
        </button>
      </div>
    </div>
    <div class="content">
      <div class="header">
        <span class="app-title">Snipalot</span>
        <span class="state-label" id="state-label">IDLE</span>
        <span class="header-spacer"></span>
        <button id="btn-settings" class="btn-icon btn-icon-sm" title="Settings">⚙</button>
      </div>
      <div class="controls">
        <button id="btn-primary" class="btn-primary" title="Record">
          <!-- Play-triangle glyph; sibling Screenshot button uses a
               camera glyph for visual symmetry. -->
          <svg class="btn-glyph" width="12" height="12" viewBox="0 0 12 12" aria-hidden="true">
            <polygon points="2,1 11,6 2,11" fill="currentColor"/>
          </svg>
          <span id="btn-label">Record</span>
        </button>
        <button id="btn-screenshot" class="btn-screenshot" title="Screenshot">
          <!-- Camera glyph: rounded body (rect), viewfinder hump (small
               rect on top), and lens (circle). currentColor inherits
               from the button so it re-tints with the active state. -->
          <svg class="btn-glyph" width="14" height="12" viewBox="0 0 14 12" aria-hidden="true">
            <rect x="4.2" y="0.5" width="3.6" height="1.6" rx="0.4" fill="currentColor"/>
            <rect x="0.5" y="2" width="11" height="9" rx="1.2" fill="none" stroke="currentColor" stroke-width="1.1"/>
            <circle cx="6" cy="6.5" r="2.4" fill="none" stroke="currentColor" stroke-width="1.1"/>
          </svg>
          <span id="btn-screenshot-label">Screenshot</span>
        </button>
        <button id="btn-trade" class="btn-trade" title="Trade — record a session for trade-log extraction">
          <!-- Candlestick chart glyph: three vertical wicks of varying
               height (the bottom of one slightly above the prior, evoking
               an uptrend), with thicker bodies. currentColor inherits
               from the button so it re-tints in the selecting state. -->
          <svg class="btn-glyph" width="14" height="12" viewBox="0 0 14 12" aria-hidden="true">
            <line x1="2.5" y1="1.5" x2="2.5" y2="10.5" stroke="currentColor" stroke-width="1"/>
            <rect x="1.4" y="3.5" width="2.2" height="4" fill="currentColor"/>
            <line x1="7" y1="0.5" x2="7" y2="11" stroke="currentColor" stroke-width="1"/>
            <rect x="5.9" y="2" width="2.2" height="6.5" fill="currentColor"/>
            <line x1="11.5" y1="2" x2="11.5" y2="9" stroke="currentColor" stroke-width="1"/>
            <rect x="10.4" y="3" width="2.2" height="3" fill="currentColor"/>
          </svg>
          <span id="btn-trade-label">Trade</span>
        </button>
      </div>
      <div class="hint" id="hint">Click Record to select a region</div>
    </div>
    <script src="launcher.js"></script>
  </body>
</html>
