<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Snipalot recorder</title>
    <style>
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: #0f1115;
        color: #e5e7eb;
        padding: 16px;
        margin: 0;
      }
      #log {
        font-family: "Cascadia Code", "Consolas", monospace;
        font-size: 12px;
        white-space: pre-wrap;
        padding: 8px;
        background: #1a1d24;
        border-radius: 6px;
        height: 220px;
        overflow-y: auto;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 12px;
      }
    </style>
  </head>
  <body>
    <h1>Snipalot recorder (hidden in production)</h1>
    <div id="log">Idle. Press Ctrl+Shift+S (or your configured start/stop hotkey) to run a 10s spike recording.</div>
    <script src="recorder.js"></script>
  </body>
</html>
